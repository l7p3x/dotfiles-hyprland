# ######################################
#      CONFIGURAÇÃO  HYPRLAND.         #
# ######################################

# autogenerated = 1 # remova esta linha para remover o aviso

# Este é um exemplo de arquivo de configuração do Hyprland.
# Consulte a wiki para mais informações.
# https://wiki.hypr.land/Configuring/

# Observe que nem todas as opções disponíveis estão definidas aqui.
# Para a lista completa, veja a wiki.

# Você pode dividir esta configuração em vários arquivos.
# Crie seus arquivos separadamente e depois faça link com este assim:
# source = ~/.config/hypr/myColors.conf

################
### MONITORES ###
################

# Veja https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto

###################
### MEUS PROGRAMAS ###
###################

# Veja https://wiki.hypr.land/Configuring/Keywords/

# Defina os programas que você usa
$terminal = foot
$fileManager = ~/.config/hypr/assets/toggle.sh nautilus
$browser = firefox
$menu = ~/.config/hypr/assets/toggle.sh bemenu

#################
### AUTOSTART ###
#################

# Iniciar automaticamente processos necessários (como daemon de notificações, barras, etc.)
# Ou execute seus aplicativos favoritos na inicialização assim:

# exec-once = nm-applet &
# exec-once = $terminal
exec-once = waybar
exec-once = hyprpaper
exec-once = SoundWireServer
exec-once = hypridle
exec-once=hyprctl setcursor Qogir 21

env = XCURSOR_THEME, Qogir
env = XCURSOR_SIZE, 21
env = MOZ_ENABLE_WAYLAND,1
env = LIBVA_DRIVER_NAME,i965
env = QT6CT_PLATFORMTHEME,qt6ct

render {
    new_render_scheduling = true
}

#############################
### VARIÁVEIS DE AMBIENTE ###
#############################

# Veja https://wiki.hypr.land/Configuring/Environment-variables/

cursor {
    no_hardware_cursors = true
}

###################
### PERMISSÕES ###
###################

# Veja https://wiki.hypr.land/Configuring/Permissions/
# Mudanças de permissão aqui exigem reinício do Hyprland e não são aplicadas instantaneamente
# por razões de segurança.

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### APARÊNCIA ###
#####################

# Consulte https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 6
    border_size = 0

    # https://wiki.hypr.land/Configuring/Variables/#variable-types para info sobre cores
    col.active_border = rgba(ffffffff) 45deg
    col.inactive_border = rgba(595959aa)

    # Ative para permitir redimensionar janelas clicando e arrastando bordas e gaps
    resize_on_border = false

    # Leia https://wiki.hypr.land/Configuring/Tearing/ antes de ativar isso
    allow_tearing = true

    #layout = dwindle
    layout = master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 4

    # Transparência de janelas focadas e não focadas
    active_opacity = 1
    inactive_opacity = 0.7
    # fullscreen_opacity = 1

    dim_inactive = false
    dim_strength = 0.2


    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        xray = true
        special = true
        new_optimizations = true
        size = 8
        passes = 4
        brightness = 1
        noise = 0.04
        contrast = 1
        popups = true
        popups_ignorealpha = 0.6
    }
}


# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Curvas padrão, veja https://wiki.hypr.land/Configuring/Animations/#curves
    #        NOME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Animações padrão, veja https://wiki.hypr.land/Configuring/Animations/
    #            NOME,      ONOFF, VELOCIDADE,   CURVA,    [ESTILO]
    animation = global,        1,      10,     default
    animation = border,        1,    5.39,     easeOutQuint
    animation = windows,       1,    4.79,     easeOutQuint
    animation = windowsIn,     1,     4.1,     easeOutQuint, gnome
    animation = windowsOut,    1,    3.41,     easeOutQuint, slidefade
    animation = fadeIn,        1,    1.73,     almostLinear
    animation = fadeOut,       1,    1.46,     almostLinear
    animation = fade,          1,    3.03,     quick
    animation = layers,        1,    3.81,     easeOutQuint
    animation = layersIn,      1,       4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,     linear,       fade
    animation = fadeLayersIn,  1,    1.79,     almostLinear
    animation = fadeLayersOut, 1,    1.39,     almostLinear
    animation = workspaces,    1,       3,     almostLinear,  fade
    animation = workspacesIn,  1,       3,     almostLinear,  slide
    animation = workspacesOut, 1,       3,     almostLinear,  slide
    animation = zoomFactor,    1,       7,     quick

}

# https://wiki.hypr.land/Configuring/Workspace-Rules/
# “Smart gaps” / “sem gaps quando só há uma janela”
# descomente tudo se quiser usar isso
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]o
# Ignorar pedidos de maximizar de aplicativos (muito útil)
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = opacity 0.6 0.6 0.6, class:$terminal
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrulev2 = float,class:SoundWireServer
windowrulev2 = workspace special:magic silent, class:^(SoundWireServer)$
windowrulev2 = workspace 2, class:$browser
windowrulev2 = workspace 3, class:VSCodium
windowrulev2 = float, class:org.pulseaudio.pavucontrol
windowrulev2 = float, class:nm-connection-editor
windowrulev2 = float, class:discord
windowrulev2 = float, class:org.gnome.Nautilus
windowrulev2 = float, title:(System Monitor)
windowrulev2 = size 80% 80%, title:(System Monitor)
windowrulev2 = opacity 1.0 1.0 1.0, title:(System Monitor)

# Regras para o Spotify
windowrulev2 = workspace special:magic silent, class:^(Spotify)$ # Move para o workspace "magic"

# Veja https://wiki.hypr.land/Configuring/Dwindle-Layout/ para mais
dwindle {
    preserve_split = true # Você provavelmente quer isso
    force_split = 2
    precise_mouse_move = true
}

# Veja https://wiki.hypr.land/Configuring/Master-Layout/ para mais
master {
    new_status = slave
    new_on_active = after
    new_on_top = false
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # coloque 0 ou 1 para desativar os wallpapers de mascote anime
    disable_hyprland_logo = true # Se true, desativa o logo aleatório / garota anime. :(
    new_window_takes_over_fullscreen = 2
    initial_workspace_tracking = false
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 significa sem modificação.

    touchpad {
        natural_scroll = false
    }
}

# Veja https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Exemplo de configuração por dispositivo
# https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# Veja https://wiki.hypr.land/Configuring/Keywords/
$mainMod = ALT # Define a tecla ALT como modificador principal

# Atalhos. Veja mais em https://wiki.hypr.land/Configuring/Binds/

# -------------------------------
# Aplicativos
# -------------------------------
bind = $mainMod, T   , exec, $terminal
bind = $mainMod, E   , exec, $fileManager
bind = $mainMod, R   , exec, $menu
bind = $mainMod, F   , exec, $browser
bind = WIN     , F1  , exec, ~/.config/hypr/assets/gamemode.sh

# -------------------------------
# Janelas e layouts # dwindle
# -------------------------------
bind = $mainMod, V  , togglefloating
bind = $mainMod, mouse:274, layoutmsg, swapsplit
bind = $mainMod, Tab, focuscurrentorlast
bind = WIN     , Tab, fullscreen, 1 # maximizar
bind = , F11, fullscreen
bind = $mainMod, Q  , killactive
bind = $mainMod SHIFT, T, pin, active
bind = , F1, exec, hyprctl keyword general:layout "$(hyprctl getoption general:layout | grep -q 'dwindle' && echo 'master' || echo 'dwindle')"

# -------------------------------
# Janelas e layouts # master
# -------------------------------
bind = $mainMod, mouse:274, layoutmsg, swapwithmaster child

# -------------------------------
# Sistema e Hyprland
# -------------------------------
bind = $mainMod, ESCAPE, exit
bind = WIN, R, exec, bash -c "hyprctl reload; pkill waybar; pkill dunst; waybar & dunst & notify-send 'Hyprland' 'Configurações recarregadas'"
bind = $mainMod CTRL, ESCAPE, exec, $terminal --title "System Monitor" -e btop

# -------------------------------
# Captura de tela
# -------------------------------
bind = , PRINT, exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = SHIFT, PRINT, exec, hyprshot -m region -o ~/Pictures/Screenshots

# Mover foco com mainMod + setas
bind = $mainMod, left , movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up   , movefocus, u
bind = $mainMod, down , movefocus, d

# Trocar workspace com mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janela ativa com mainMod + SHIFT + número
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Workspace especial (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL, M, movetoworkspacesilent, +0
bind = $mainMod CTRL, S, movetoworkspacesilent, special:magic

# Scroll para alternar workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover/redimensionar com mainMod + mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Teclas multimídia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requer playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

